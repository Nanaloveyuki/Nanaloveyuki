version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      astro-and-tooling:
        patterns:
          - astro
          - '@astrojs/*'
          - eslint
          - '@eslint/*'
          - eslint-*
          - prettier
          - prettier-*
          - typescript-eslint
          - knip
          - globals

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
